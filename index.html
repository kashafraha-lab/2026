<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مدير المعاملات - مع آلة حاسبة متطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #232323;
            --bg-input: #2b2b2b;
            --border-color: #333;
            --text-primary: #f5f5f5;
            --text-secondary: #aaa;
            --accent-color: #00b894;
            --accent-hover: #00ce9a;
            --accent-gradient: linear-gradient(145deg, #00b894, #008b6d);
            --danger-color: #8b0000;
            --toolbar-bg: #2b2b2b;
            --modal-bg: #1f1f1f;
            --font-size-base: 15px;
            --bottom-nav-bg: #1c1c1e;
            --calculator-btn: #2d2d2d;
        }

        body.light-mode {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #f0f0f0;
            --bg-input: #e0e0e0;
            --border-color: #ccc;
            --text-primary: #222;
            --text-secondary: #555;
            --accent-color: #00a67e;
            --accent-hover: #008b6d;
            --accent-gradient: linear-gradient(145deg, #00a67e, #006b54);
            --danger-color: #b30000;
            --toolbar-bg: #e0e0e0;
            --modal-bg: #fafafa;
            --bottom-nav-bg: #f2f2f7;
            --calculator-btn: #e5e5e5;
        }

        body {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            font-size: var(--font-size-base);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            margin: 0 auto;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* الشريط العلوي */
        .top-bar {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-secondary);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            font-size: 1.8rem;
            color: var(--accent-color);
            filter: drop-shadow(0 4px 8px rgba(0, 184, 148, 0.3));
        }
        .logo span {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), #cccccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .top-btn {
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 42px;
            height: 42px;
            border-radius: 21px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.2rem;
        }
        .top-btn i {
            color: var(--accent-color);
        }
        .top-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent-color);
        }
        .top-btn.privacy-active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .top-btn.privacy-active i {
            color: white;
        }

        /* قائمة العملاء */
        .customers-list {
            padding: 12px 16px;
            flex: 1 1 auto;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) var(--bg-primary);
            min-height: 0;
        }

        .customers-list::-webkit-scrollbar {
            width: 5px;
        }
        .customers-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        .customers-list::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 20px;
        }

        /* الشريط السفلي */
        .bottom-nav {
            background-color: var(--bottom-nav-bg);
            border-top: 1px solid var(--border-color);
            padding: 6px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.7rem;
            transition: 0.2s;
            cursor: pointer;
            flex: 1;
            padding: 4px 0;
            border-radius: 30px;
        }
        .nav-item i {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }
        .nav-item span {
            font-size: 0.65rem;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-item.add-large {
            background: var(--accent-gradient);
            color: white;
            border-radius: 40px;
            padding: 8px 16px;
            margin: 0 10px;
            flex: 0 0 auto;
            min-width: 70px;
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.5);
        }
        .nav-item.add-large i {
            font-size: 1.6rem;
            margin-bottom: 0;
        }
        .nav-item.add-large span {
            font-size: 0.7rem;
            font-weight: 600;
        }

        .nav-item.left, .nav-item.right {
            flex: 1;
        }

        /* باقي الأنماط (مودالات، بطاقات) */
        .customer-row {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .customer-row.cancelled {
            opacity: 0.6;
            filter: grayscale(0.8);
            text-decoration: line-through;
        }

        .customer-row:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .customer-id {
            background: var(--bg-input);
            width: 38px;
            height: 38px;
            border-radius: 19px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .customer-id:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .customer-name {
            flex: 2;
            padding: 0 12px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .customer-name:hover {
            color: var(--accent-color);
        }

        .status-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .status-btn {
            border: none;
            background: var(--bg-input);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 25px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .status-btn.sold {
            background: #1e4a2b;
            color: #b0ffb0;
            border-color: #2e8b57;
        }

        .status-btn.booked {
            background: #1e3f5a;
            color: #a0d0ff;
            border-color: #1e6f9f;
        }

        /* وضع الخصوصية */
        .customers-list.privacy-mode .customer-row *:not(.status-btn, .btn) {
            filter: blur(4px);
            user-select: none;
        }

        /* مودال الآلة الحاسبة المتطورة */
        .calc-expression {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px 24px 0 0;
            padding: 10px 18px;
            font-size: 1rem;
            text-align: left;
            direction: ltr;
            color: var(--text-secondary);
            border-bottom: none;
            overflow-x: auto;
            white-space: nowrap;
            min-height: 40px;
        }
        .calc-display {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 0 0 24px 24px;
            padding: 20px 18px;
            font-size: 2rem;
            text-align: left;
            direction: ltr;
            margin-bottom: 15px;
            color: var(--text-primary);
            overflow-x: auto;
            white-space: nowrap;
            border-top: none;
        }
        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .calc-btn {
            background: var(--calculator-btn);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.4rem;
            padding: 15px 0;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
            font-weight: 500;
        }
        .calc-btn.operator {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-hover);
        }
        .calc-btn.equals {
            background: var(--accent-gradient);
            color: white;
            grid-column: span 2;
        }
        .calc-btn.clear {
            background: var(--danger-color);
            color: white;
        }
        .calc-btn.percent {
            background: #4a4a4a;
            color: white;
        }

        /* باقي المودالات */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 600px;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            transform: scale(0.9);
            transition: transform 0.25s ease;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        @media (min-width: 768px) {
            .modal-content {
                max-width: 700px;
            }
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--bg-input);
            width: 38px;
            height: 38px;
            border-radius: 19px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .modal-close:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .modal-content h2 {
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--text-primary);
            border-right: 5px solid var(--accent-color);
            padding-right: 16px;
        }

        .input-field {
            margin-bottom: 16px;
        }

        .input-field label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .input-field input, .input-field select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .input-field input:focus {
            border-color: var(--accent-color);
        }

        .input-field input:disabled {
            opacity: 0.5;
            background: var(--bg-card);
        }

        .extra-actions {
            display: flex;
            gap: 10px;
            margin: 20px 0 14px;
            flex-wrap: wrap;
        }

        .action-chip {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 auto;
            justify-content: center;
        }

        .action-chip.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .empty-list {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px 15px;
            font-size: 1.2rem;
            border: 2px dashed var(--border-color);
            border-radius: 30px;
            margin: 15px 0;
        }

        .reports-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 16px 0;
        }

        .report-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 20px 10px;
            text-align: center;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }

        .report-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        .report-card i {
            font-size: 2.4rem;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .report-card h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .report-card .summary {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.95rem;
        }

        .report-table th {
            text-align: right;
            padding: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .report-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .share-btn {
            background: var(--bg-input);
            border: 1px solid var(--accent-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 0.95rem;
        }

        #fileImport {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            <span>مدير المعاملات</span>
        </div>
        <div class="top-actions">
            <button class="top-btn" id="importBtn" title="استيراد"><i class="fas fa-file-import"></i></button>
            <button class="top-btn" id="exportBtn" title="تصدير"><i class="fas fa-file-export"></i></button>
            <button class="top-btn" id="darkModeToggle" title="الوضع الداكن"><i class="fas fa-moon"></i></button>
            <button class="top-btn" id="privacyToggle" title="خصوصية"><i class="fas fa-eye"></i></button>
        </div>
    </div>

    <!-- قائمة العملاء -->
    <div class="customers-list" id="customersList">
        <div class="empty-list">لا يوجد معاملات بعد<br> <i class="fas fa-plus-circle"></i></div>
    </div>

    <!-- الشريط السفلي -->
    <div class="bottom-nav">
        <div class="nav-item left" id="reportsBtn">
            <i class="fas fa-chart-pie"></i>
            <span>تقارير</span>
        </div>
        <div class="nav-item add-large" id="openAddModalBtn">
            <i class="fas fa-plus-circle"></i>
            <span>إضافة</span>
        </div>
        <div class="nav-item right" id="calculatorBtn">
            <i class="fas fa-calculator"></i>
            <span>آلة حاسبة</span>
        </div>
    </div>

    <input type="file" id="fileImport" accept=".xlsx, .xls, .csv">
</div>

<!-- مودال الآلة الحاسبة المتطورة -->
<div class="modal-overlay" id="calculatorModal">
    <div class="modal-content">
        <div class="modal-close" id="closeCalculatorX"><i class="fas fa-times"></i></div>
        <h2>آلة حاسبة</h2>
        <div class="calc-expression" id="calcExpression"></div>
        <div class="calc-display" id="calcDisplay">0</div>
        <div class="calculator-grid">
            <div class="calc-btn clear" data-value="C">C</div>
            <div class="calc-btn percent" data-value="%">%</div>
            <div class="calc-btn operator" data-value="/">÷</div>
            <div class="calc-btn operator" data-value="*">×</div>
            <div class="calc-btn" data-value="7">7</div>
            <div class="calc-btn" data-value="8">8</div>
            <div class="calc-btn" data-value="9">9</div>
            <div class="calc-btn operator" data-value="-">-</div>
            <div class="calc-btn" data-value="4">4</div>
            <div class="calc-btn" data-value="5">5</div>
            <div class="calc-btn" data-value="6">6</div>
            <div class="calc-btn operator" data-value="+">+</div>
            <div class="calc-btn" data-value="1">1</div>
            <div class="calc-btn" data-value="2">2</div>
            <div class="calc-btn" data-value="3">3</div>
            <div class="calc-btn equals" data-value="=">=</div>
            <div class="calc-btn" data-value="0">0</div>
            <div class="calc-btn" data-value="00">00</div>
            <div class="calc-btn" data-value=".">.</div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="closeCalculatorBtn">إغلاق</button>
        </div>
    </div>
</div>

<!-- باقي المودالات (نفس الشيء) -->
<div class="modal-overlay" id="addModal"><div class="modal-content" id="addModalContent"><div class="modal-close" id="closeAddModalX"><i class="fas fa-times"></i></div></div></div>
<div class="modal-overlay" id="detailsModal"><div class="modal-content" id="detailsContent"></div></div>
<div class="modal-overlay" id="quickViewModal"><div class="modal-content" id="quickViewContent"></div></div>
<div class="modal-overlay" id="sellModal"><div class="modal-content"><div class="modal-close" id="closeSellX"><i class="fas fa-times"></i></div><h2>إتمام البيع</h2><div id="sellSteps"></div><div class="modal-actions"><button class="btn btn-secondary" id="closeSellModal">إلغاء</button><button class="btn btn-primary" id="nextSellStep">التالي</button></div></div></div>
<div class="modal-overlay" id="bookingModal"><div class="modal-content"><div class="modal-close" id="closeBookingX"><i class="fas fa-times"></i></div><h2>تاريخ الحجز</h2><div class="input-field"><label>اختر التاريخ</label><input type="date" id="bookingDate"></div><div class="modal-actions"><button class="btn btn-secondary" id="closeBookingModal">إلغاء</button><button class="btn btn-primary" id="saveBookingBtn">حفظ</button></div></div></div>
<div class="modal-overlay" id="reportsModal"><div class="modal-content"><div class="modal-close" id="closeReportsX"><i class="fas fa-times"></i></div><h2>تفاصيل المعاملات</h2><div class="reports-grid" id="reportsGrid"></div><div class="modal-actions"><button class="btn btn-secondary" id="closeReportsModal">إغلاق</button></div></div></div>
<div class="modal-overlay" id="tableModal"><div class="modal-content" id="tableModalContent"><div class="modal-close" id="closeTableX"><i class="fas fa-times"></i></div></div></div>

<script>
    (function() {
        let customers = [];
        let currentCustomerId = null;
        let currentSellStep = 0;
        let tempSellData = {};
        let privacyMode = false;
        let darkMode = true;

        // متغيرات الآلة الحاسبة المتطورة
        let calcInput = '0';           // الرقم الحالي المعروض
        let calcExpression = '';       // العملية كاملة
        let prevValue = null;          // الرقم السابق
        let currentOperator = null;    // العملية الحالية
        let shouldResetInput = false;  // هل نبدأ رقم جديد بعد عملية

        function generateId() { return Date.now() + Math.floor(Math.random() * 1000); }

        function loadFromStorage() {
            const stored = localStorage.getItem('customers');
            if (stored) { try { customers = JSON.parse(stored); } catch(e) { customers = []; } }
            else customers = [];
        }
        function saveToStorage() {

        // دوال الآلة الحاسبة المتطورة
        function updateCalcDisplay() {
            const exprEl = document.getElementById('calcExpression');
            const dispEl = document.getElementById('calcDisplay');
            if (exprEl) exprEl.innerText = calcExpression || ' ';
            if (dispEl) dispEl.innerText = calcInput;
        }

        function handleCalcButton(val) {
            if (val === 'C') {
                // مسح كامل
                calcInput = '0';
                calcExpression = '';
                prevValue = null;
                currentOperator = null;
                shouldResetInput = false;
                updateCalcDisplay();
                return;
            }

            if (val === '=') {
                // تنفيذ العملية
                if (currentOperator && prevValue !== null) {
                    const current = parseFloat(calcInput);
                    let result;
                    switch(currentOperator) {
                        case '+': result = prevValue + current; break;
                        case '-': result = prevValue - current; break;
                        case '*': result = prevValue * current; break;
                        case '/': result = prevValue / current; break;
                        default: result = current;
                    }
                    calcInput = result.toString();
                    calcExpression = ''; // نعبر أن العملية انتهت
                    prevValue = null;
                    currentOperator = null;
                    shouldResetInput = true;
                } else {
                    // إذا ضغط = بدون عملية، نعيد نفس الرقم
                }
                updateCalcDisplay();
                return;
            }

            if (val === '%') {
                // معالجة النسبة المئوية
                if (currentOperator && prevValue !== null) {
                    // إذا كان هناك عملية سابقة، نحول الرقم الحالي إلى نسبة من الرقم السابق
                    const current = parseFloat(calcInput);
                    const percentValue = (prevValue * current) / 100;
                    // نطبق العملية على الفور
                    let result;
                    switch(currentOperator) {
                        case '+': result = prevValue + percentValue; break;
                        case '-': result = prevValue - percentValue; break;
                        case '*': result = prevValue * (current / 100); break; // ضرب نسبة
                        case '/': result = prevValue / (current / 100); break; // قسمة نسبة
                        default: result = percentValue;
                    }
                    calcInput = result.toString();
                    calcExpression = ''; // ننهي العملية
                    prevValue = null;
                    currentOperator = null;
                    shouldResetInput = true;
                } else {
                    // بدون عملية: تحويل الرقم الحالي إلى نسبة مئوية (قسمة على 100)
                    calcInput = (parseFloat(calcInput) / 100).toString();
                }
                updateCalcDisplay();
                return;
            }

            if (['+', '-', '*', '/'].includes(val)) {
                // إذا كان هناك عملية سابقة، ننفذها أولاً
                if (currentOperator && prevValue !== null && !shouldResetInput) {
                    const current = parseFloat(calcInput);
                    let result;
                    switch(currentOperator) {
                        case '+': result = prevValue + current; break;
                        case '-': result = prevValue - current; break;
                        case '*': result = prevValue * current; break;
                        case '/': result = prevValue / current; break;
                        default: result = current;
                    }
                    prevValue = result;
                    calcInput = result.toString();
                } else if (prevValue === null) {
                    // أول عملية
                    prevValue = parseFloat(calcInput);
                }
                currentOperator = val;
                // بناء التعبير
                calcExpression = prevValue + ' ' + currentOperator + ' ';
                shouldResetInput = true;
                updateCalcDisplay();
                return;
            }

            // أرقام أو نقطة
            if (shouldResetInput) {
                calcInput = (val === '.' ? '0.' : val);
                shouldResetInput = false;
            } else {
                if (val === '.' && calcInput.includes('.')) return;
                if (calcInput === '0' && val !== '.') calcInput = val;
                else calcInput += val;
            }
            // تحديث التعبير إذا كنا في منتصف عملية
            if (currentOperator && prevValue !== null) {
                calcExpression = prevValue + ' ' + currentOperator + ' ' + calcInput;
            } else {
                calcExpression = ''; // إذا لم تكن هناك عملية، نترك التعبير فارغاً
            }
            updateCalcDisplay();
        }

        function openTableModal(reportType) {
            const modal = document.getElementById('tableModal');
            const content = document.getElementById('tableModalContent');
            let title = '', tableRows = '', totalValue = null;

            switch(reportType) {
                case 'purchases': {
                    title = 'المشتريات';
                    const active = customers.filter(c => c.status !== 'cancelled');
                    tableRows = active.map(c => {
                        const purchaseValue = c.half ? 'نصف' : (c.cardPurchasePrice || 0).toFixed(2);
                        return `<tr><td>${c.name}</td><td>${purchaseValue}</td></tr>`;
                    }).join('');
                    totalValue = active.reduce((s, c) => s + (c.half ? 0 : (c.cardPurchasePrice || 0)), 0);
                    break;
                }
                case 'profits': {
                    title = 'الأرباح';
                    const active = customers.filter(c => c.status !== 'cancelled');
                    tableRows = active.map(c => {
                        const cost = c.half ? 0 : (c.cardPurchasePrice || 0);
                        const profit = (c.salePrice || 0) - cost - (c.shippingValue || 0);
                        return `<tr><td>${c.name}</td><td>${profit.toFixed(2)}</td></tr>`;
                    }).join('');
                    totalValue = active.reduce((s, c) => {
                        const cost = c.half ? 0 : (c.cardPurchasePrice || 0);
                        return s + ((c.salePrice || 0) - cost - (c.shippingValue || 0));
                    }, 0);
                    break;
                }
                case 'ongoing':
                    title = 'المعاملات الجارية';
                    const ongoing = customers.filter(c => c.status === 'pending' || !c.status);
                    tableRows = ongoing.map(c => `<tr><td colspan="2" style="text-align:center;">${c.name}</td></tr>`).join('');
                    totalValue = ongoing.length;
                    break;
                case 'executed':
                    title = 'المعاملات المنفذة';
                    const executed = customers.filter(c => c.status === 'sold');
                    tableRows = executed.map(c => `<tr><td colspan="2" style="text-align:center;">${c.name}</td></tr>`).join('');
                    totalValue = executed.length;
                    break;
                case 'bookings':
                    title = 'الحجوزات';
                    const booked = customers.filter(c => c.status === 'booked');
                    tableRows = booked.map(c => `<tr><td>${c.name}</td><td>${c.bookingDate || 'غير محدد'}</td></tr>`).join('');
                    totalValue = booked.length;
                    break;
                case 'cancelled':
                    title = 'المعاملات الملغية';
                    const cancelled = customers.filter(c => c.status === 'cancelled');
                    tableRows = cancelled.map(c => `<tr><td colspan="2" style="text-align:center;">${c.name}</td></tr>`).join('');
                    totalValue = cancelled.length;
                    break;
            }

            let tableHeader = '';
            if (reportType === 'ongoing' || reportType === 'executed' || reportType === 'cancelled') {
                tableHeader = '<tr><th colspan="2">الاسم</th></tr>';
            } else if (reportType === 'purchases') {
                tableHeader = '<tr><th>الاسم</th><th>قيمة الشراء</th></tr>';
            } else if (reportType === 'profits') {
                tableHeader = '<tr><th>الاسم</th><th>الربح</th></tr>';
            } else if (reportType === 'bookings') {
                tableHeader = '<tr><th>الاسم</th><th>تاريخ الحجز</th></tr>';
            }

            content.innerHTML = `
                <div class="modal-close" id="closeTableX"><i class="fas fa-times"></i></div>
                <h2>${title}</h2>
                <div style="margin: 10px 0; color: var(--accent-color); font-size: 1.2rem;">الإجمالي: ${totalValue?.toFixed(2) ?? totalValue}</div>
                <table class="report-table"><thead>${tableHeader}</thead><tbody>${tableRows || '<tr><td colspan="2">لا توجد بيانات</td></tr>'}</tbody></table>
                <button class="share-btn" id="shareReportBtn"><i class="fas fa-share-alt"></i> مشاركة التقرير</button>
                <div class="modal-actions"><button class="btn btn-secondary" id="closeTableModal">إغلاق</button></div>
            `;
            modal.classList.add('show');

            document.getElementById('shareReportBtn').addEventListener('click', () => {
                let text = `${title}\nالإجمالي: ${totalValue}\n`;
                text += customers.map(c => {
                    if (reportType === 'purchases') {
                        const val = c.half ? 'نصف' : c.cardPurchasePrice;
                        return `${c.name}: ${val}`;
                    }
                    if (reportType === 'profits') {
                        const cost = c.half ? 0 : (c.cardPurchasePrice || 0);
                        const profit = (c.salePrice||0) - cost - (c.shippingValue||0);
                        return `${c.name}: ${profit.toFixed(2)}`;
                    }
                    if (reportType === 'ongoing' && (!c.status || c.status==='pending')) return c.name;
                    if (reportType === 'executed' && c.status==='sold') return c.name;
                    if (reportType === 'bookings' && c.status==='booked') return `${c.name}: ${c.bookingDate}`;
                    if (reportType === 'cancelled' && c.status==='cancelled') return c.name;
                    return null;
                }).filter(Boolean).join('\n');
                if (navigator.share) navigator.share({ title, text });
                else navigator.clipboard.writeText(text).then(() => alert('تم نسخ التقرير'));
            });

            document.getElementById('closeTableX').addEventListener('click', () => modal.classList.remove('show'));
            document.getElementById('closeTableModal').addEventListener('click', () => modal.classList.remove('show'));
        }

                <div class="input-field"><label>IBAN</label><input type="text" id="iban"></div>
                <div class="input-field"><label>سعر شراء البطاقة</label><input type="number" id="cardPurchase" step="0.01"></div>
                <div class="input-field"><label>قيمة شحن المعاملة</label><input type="number" id="shipping" step="0.01"></div>
                <div class="input-field"><label>سعر بيع المعاملة</label><input type="number" id="salePrice" step="0.01"></div>
                <div class="extra-actions">
                    <div class="action-chip" id="halfChipAdd"><i class="fas fa-divide"></i> بالنصف</div>
                    <div class="action-chip" id="hasCardChipAdd"><i class="fas fa-id-card"></i> لديه بطاقة</div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="closeAddModalBtn">إلغاء</button>
                    <button class="btn btn-primary" id="saveCustomerBtn">حفظ</button>
                </div>
            `;

            document.getElementById('halfChipAdd').addEventListener('click', function() {
                this.classList.toggle('active');
                const purchaseField = document.getElementById('cardPurchase');
                purchaseField.disabled = this.classList.contains('active');
                if (this.classList.contains('active')) purchaseField.value = '';
            });
            document.getElementById('hasCardChipAdd').addEventListener('click', function() {
                this.classList.toggle('active');
            });

            document.getElementById('openAddModalBtn').addEventListener('click', openAddModal);
            document.getElementById('closeAddModalBtn')?.addEventListener('click', closeAllModals);
            document.getElementById('closeAddModalX')?.addEventListener('click', closeAllModals);

            document.getElementById('saveCustomerBtn').addEventListener('click', function() {
                const name = document.getElementById('name').value.trim();
                if (!name) return alert('الاسم مطلوب');
                const halfActive = document.getElementById('halfChipAdd').classList.contains('active');
                const newCustomer = {
                    id: generateId(),
                    name, phone: document.getElementById('phone').value, passport: document.getElementById('passport').value,
                    nationalId: document.getElementById('nationalId').value, iban: document.getElementById('iban').value,
                    cardPurchasePrice: halfActive ? 0 : (parseFloat(document.getElementById('cardPurchase').value) || 0),
                    shippingValue: parseFloat(document.getElementById('shipping').value) || 0,
                    salePrice: parseFloat(document.getElementById('salePrice').value) || 0,
                    half: halfActive,
                    hasCard: document.getElementById('hasCardChipAdd').classList.contains('active'),
                    status: 'pending', bookingDate: null
                };
                customers.push(newCustomer);
                saveToStorage();
                renderCustomers();
                closeAllModals();
            });

            // أحداث القائمة
            document.getElementById('customersList').addEventListener('click', function(e) {
                const target = e.target.closest('[data-id]');
                if (!target) return;
                const id = target.dataset.id;
                const customer = customers.find(c => c.id == id);
                if (!customer) return;

                if (target.classList.contains('customer-id') || target.dataset.action === 'share') {
                    shareCustomer(customer);
                } else if (target.dataset.action === 'sell') {
                    openSellModal(customer);
                } else if (target.dataset.action === 'book') {
                    openBookingModal(customer);
                } else if (target.classList.contains('customer-name') || target.dataset.action === 'name') {
                    e.preventDefault();
                    handleNameClick(e, customer);
                }
            });

            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', function(e) { if (e.target === overlay) this.classList.remove('show'); });
            });

            // أزرار المودالات الأخرى
            document.getElementById('closeSellX')?.addEventListener('click', () => document.getElementById('sellModal').classList.remove('show'));
            document.getElementById('closeBookingX')?.addEventListener('click', () => document.getElementById('bookingModal').classList.remove('show'));
            document.getElementById('closeReportsX')?.addEventListener('click', () => document.getElementById('reportsModal').classList.remove('show'));
            document.getElementById('closeReportsModal')?.addEventListener('click', () => document.getElementById('reportsModal').classList.remove('show'));
            document.getElementById('closeSellModal')?.addEventListener('click', () => document.getElementById('sellModal').classList.remove('show'));
            document.getElementById('closeBookingModal')?.addEventListener('click', () => document.getElementById('bookingModal').classList.remove('show'));

            document.getElementById('saveBookingBtn').addEventListener('click', function() {
                const date = document.getElementById('bookingDate').value;
                if (currentCustomerId) updateCustomer(currentCustomerId, { status: 'booked', bookingDate: date });
                document.getElementById('bookingModal').classList.remove('show');
            });

            // أزرار الاستيراد/التصدير
            document.getElementById('importBtn').addEventListener('click', function() {
                document.getElementById('fileImport').click();
            });
            document.getElementById('fileImport').addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    importFromExcel(e.target.files[0]);
                    e.target.value = '';
                }
            });
            document.getElementById('exportBtn').addEventListener('click', exportToExcel);
            document.getElementById('privacyToggle').addEventListener('click', togglePrivacy);
            document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('reportsBtn').addEventListener('click', openReportsModal);

            // آلة حاسبة
            document.getElementById('calculatorBtn').addEventListener('click', () => {
                document.getElementById('calculatorModal').classList.add('show');
                // إعادة تعيين العرض
                calcInput = '0';
                calcExpression = '';
                prevValue = null;
                currentOperator = null;
                shouldResetInput = false;
                updateCalcDisplay();
            });

            document.getElementById('closeCalculatorX').addEventListener('click', () => document.getElementById('calculatorModal').classList.remove('show'));
            document.getElementById('closeCalculatorBtn').addEventListener('click', () => document.getElementById('calculatorModal').classList.remove('show'));

            // أزرار الآلة الحاسبة
            document.querySelectorAll('.calc-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.value;
                    handleCalcButton(val);
                });
            });
        });

        // دوال Excel
        function exportToExcel() {
            const wsData = customers.map(c => ({
                'الاسم': c.name || '',
                'رقم التليفون': c.phone || '',
                'جواز السفر': c.passport || '',
                'الرقم الوطني': c.nationalId || '',
                'IBAN': c.iban || '',
                'سعر شراء البطاقة': c.half ? 'نصف' : (c.cardPurchasePrice || 0),
                'قيمة شحن المعاملة': c.shippingValue || 0,
                'سعر بيع المعاملة': c.salePrice || 0,
                'الحالة': c.status || 'pending',
                'بالنصف': c.half ? 'نعم' : 'لا',
                'لديه بطاقة': c.hasCard ? 'نعم' : 'لا',
                'تاريخ الحجز': c.bookingDate || ''
            }));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, 'العملاء');
            XLSX.writeFile(wb, 'العملاء.xlsx');
        }

        function importFromExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                if (rows.length < 2) return;
                const newCustomers = [];
                for (let i=1; i<rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;
                    const half = row[9] === 'نعم' ? true : false;
                    const c = {
                        id: generateId(),
                        name: row[0] || '',
                        phone: row[1] || '',
                        passport: row[2] || '',
                        nationalId: row[3] || '',
                        iban: row[4] || '',
                        cardPurchasePrice: half ? 0 : (parseFloat(row[5]) || 0),
                        shippingValue: parseFloat(row[6]) || 0,
                        salePrice: parseFloat(row[7]) || 0,
                        status: row[8] || 'pending',
                        half: half,
                        hasCard: row[10] === 'نعم' ? true : false,
                        bookingDate: row[11] || null
                    };
                    newCustomers.push(c);
                }
                if (newCustomers.length) {
                    customers = [...customers, ...newCustomers];
                    saveToStorage();
                    renderCustomers();
                    alert(`تم استيراد ${newCustomers.length} عميل بنجاح.`);
                }
            };
            reader.readAsArrayBuffer(file);
        }
    })();
</script>
</body>
</html>
