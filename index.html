<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مدير المعاملات - واجهة ثابتة</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* متغيرات الألوان - الوضع الداكن (الافتراضي) */
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #232323;
            --bg-input: #2b2b2b;
            --border-color: #333;
            --text-primary: #f5f5f5;
            --text-secondary: #aaa;
            --accent-color: #00b894;      /* أخضر عصري */
            --accent-hover: #00ce9a;
            --accent-gradient: linear-gradient(145deg, #00b894, #008b6d);
            --danger-color: #8b0000;
            --toolbar-bg: #2b2b2b;
            --modal-bg: #1f1f1f;
        }

        /* الوضع الفاتح */
        body.light-mode {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #f0f0f0;
            --bg-input: #e0e0e0;
            --border-color: #ccc;
            --text-primary: #222;
            --text-secondary: #555;
            --accent-color: #00a67e;
            --accent-hover: #008b6d;
            --accent-gradient: linear-gradient(145deg, #00a67e, #006b54);
            --danger-color: #b30000;
            --toolbar-bg: #e0e0e0;
            --modal-bg: #fafafa;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-secondary);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            transition: background-color 0.3s;
            display: flex;
            flex-direction: column;
            height: 95vh; /* استخدام ارتفاع ثابت لملء الشاشة */
            max-height: 800px;
        }

        /* شعار */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            font-size: 2rem;
            color: var(--accent-color);
            filter: drop-shadow(0 4px 8px rgba(0, 184, 148, 0.3));
        }
        .logo span {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), #cccccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header {
            padding: 16px 16px 8px 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .btn-add {
            background: var(--accent-gradient);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 28px;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(0, 184, 148, 0.4);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-add:hover {
            background: linear-gradient(145deg, var(--accent-hover), #006b4f);
            transform: scale(1.05);
        }

        .toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .tool-btn {
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 auto;
            justify-content: center;
            font-weight: 500;
        }

        .tool-btn i {
            font-size: 1rem;
            color: var(--accent-color);
        }

        .tool-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent-color);
        }

        .tool-btn.privacy-active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .tool-btn.privacy-active i {
            color: white;
        }

        /* قائمة العملاء - تأخذ المساحة المتبقية وتمرير داخلي */
        .customers-list {
            padding: 12px 12px 8px 12px;
            flex: 1 1 auto;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) var(--bg-primary);
            min-height: 0; /* مهم لـ flex */
        }

        .customers-list::-webkit-scrollbar {
            width: 4px;
        }
        .customers-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        .customers-list::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 20px;
        }

        .customer-row {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .customer-row:hover {
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .customer-id {
            background: var(--bg-input);
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .customer-id:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .customer-name {
            flex: 2;
            padding: 0 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .customer-name:hover {
            color: var(--accent-color);
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 3px 6px;
            border-radius: 30px;
            background: var(--bg-input);
            color: var(--text-secondary);
        }

        .status-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-btn {
            border: none;
            background: var(--bg-input);
            color: var(--text-primary);
            padding: 5px 8px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .status-btn.sold {
            background: #1e4a2b;
            color: #b0ffb0;
            border-color: #2e8b57;
        }

        .status-btn.booked {
            background: #1e3f5a;
            color: #a0d0ff;
            border-color: #1e6f9f;
        }

        .customers-list.privacy-mode .customer-row *:not(.status-btn i):not(.btn) {
            filter: blur(4px);
            user-select: none;
        }

        /* شريط الإجراءات السفلية (ثابت) */
        .bottom-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 12px 16px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .home-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.4);
            transition: 0.2s;
        }

        .home-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .go-top {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 44px;
            height: 44px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .go-top:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* باقي الأنماط (المودالات) تبقى كما هي مع تحسينات طفيفة */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 32px;
            padding: 22px;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            transform: scale(0.9);
            transition: transform 0.25s ease;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--bg-input);
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .modal-close:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .modal-content h2 {
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 1.6rem;
            color: var(--text-primary);
            border-right: 6px solid var(--accent-color);
            padding-right: 14px;
        }

        .input-field {
            margin-bottom: 16px;
        }

        .input-field label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .input-field input, .input-field select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        .input-field input:focus {
            border-color: var(--accent-color);
        }

        .extra-actions {
            display: flex;
            gap: 10px;
            margin: 20px 0 12px;
            flex-wrap: wrap;
        }

        .action-chip {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 auto;
            justify-content: center;
        }

        .action-chip.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 36px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .empty-list {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px 16px;
            font-size: 1.1rem;
            border: 2px dashed var(--border-color);
            border-radius: 32px;
            margin: 10px 0;
        }

        /* شبكة التقارير مصغرة قليلاً */
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .report-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }

        .report-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        .report-card i {
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 6px;
        }

        .report-card h3 {
            font-size: 1rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .report-card .summary {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        .report-table th {
            text-align: right;
            padding: 10px;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .report-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .share-btn {
            background: var(--bg-input);
            border: 1px solid var(--accent-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        #fileImport {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <span>مدير المعاملات</span>
            </div>
            <button class="btn-add" id="openAddModalBtn"><i class="fas fa-plus"></i></button>
        </div>
        <div class="toolbar">
            <button class="tool-btn" id="importBtn"><i class="fas fa-file-import"></i> استيراد</button>
            <button class="tool-btn" id="exportBtn"><i class="fas fa-file-export"></i> تصدير</button>
            <button class="tool-btn" id="privacyToggle"><i class="fas fa-eye"></i> خصوصية</button>
            <button class="tool-btn" id="darkModeToggle"><i class="fas fa-moon"></i> دارك</button>
            <button class="tool-btn" id="reportsBtn"><i class="fas fa-chart-pie"></i> تقارير</button>
        </div>
        <input type="file" id="fileImport" accept=".xlsx, .xls, .csv">
    </div>

    <!-- قائمة العملاء (قابلة للتمرير داخلياً) -->
    <div class="customers-list" id="customersList">
        <div class="empty-list">لا يوجد معاملات بعد<br> <i class="fas fa-plus-circle"></i></div>
    </div>

    <!-- شريط سفلي ثابت مع أيقونة الرئيسية والعودة للأعلى -->
    <div class="bottom-actions">
        <div class="home-btn" id="homeBtn" title="الصفحة الرئيسية"><i class="fas fa-home"></i></div>
        <div class="go-top" id="goTopBtn" title="العودة للأعلى"><i class="fas fa-arrow-up"></i></div>
    </div>
</div>

<!-- المودالات (نفس المحتوى مع تحسينات) -->
<div class="modal-overlay" id="addModal"><div class="modal-content" id="addModalContent"><div class="modal-close" id="closeAddModalX"><i class="fas fa-times"></i></div></div></div>
<div class="modal-overlay" id="detailsModal"><div class="modal-content" id="detailsContent"></div></div>
<div class="modal-overlay" id="quickViewModal"><div class="modal-content" id="quickViewContent"></div></div>
<div class="modal-overlay" id="sellModal"><div class="modal-content"><div class="modal-close" id="closeSellX"><i class="fas fa-times"></i></div><h2>إتمام البيع</h2><div id="sellSteps"></div><div class="modal-actions"><button class="btn btn-secondary" id="closeSellModal">إلغاء</button><button class="btn btn-primary" id="nextSellStep">التالي</button></div></div></div>
<div class="modal-overlay" id="bookingModal"><div class="modal-content"><div class="modal-close" id="closeBookingX"><i class="fas fa-times"></i></div><h2>تاريخ الحجز</h2><div class="input-field"><label>اختر التاريخ</label><input type="date" id="bookingDate"></div><div class="modal-actions"><button class="btn btn-secondary" id="closeBookingModal">إلغاء</button><button class="btn btn-primary" id="saveBookingBtn">حفظ</button></div></div></div>
<div class="modal-overlay" id="reportsModal"><div class="modal-content"><div class="modal-close" id="closeReportsX"><i class="fas fa-times"></i></div><h2>تفاصيل المعاملات</h2><div class="reports-grid" id="reportsGrid"></div><div class="modal-actions"><button class="btn btn-secondary" id="closeReportsModal">إغلاق</button></div></div></div>
<div class="modal-overlay" id="tableModal"><div class="modal-content" id="tableModalContent"><div class="modal-close" id="closeTableX"><i class="fas fa-times"></i></div></div></div>

<script>
    (function() {
        let customers = [];
        let currentCustomerId = null;
        let currentSellStep = 0;
        let tempSellData = {};
        let privacyMode = false;
        let darkMode = true;
        let clickTimer = null;

        function generateId() { return Date.now() + Math.floor(Math.random() * 1000); }

        function loadFromStorage() {
            const stored = localStorage.getItem('customers');
            if (stored) { try { customers = JSON.parse(stored); } catch(e) { customers = []; } }
            else customers = [];
            customers.forEach((c, idx) => { c.idStr = (idx+1).toString(); });
        }
        function saveToStorage() {
            localStorage.setItem('customers', JSON.stringify(customers));
        }

        function renderCustomers() {
            const container = document.getElementById('customersList');
            if (!container) return;
            if (customers.length === 0) {
                container.innerHTML = '<div class="empty-list">لا يوجد معاملات بعد<br> <i class="fas fa-plus-circle"></i></div>';
                return;
            }

            let html = '';
            customers.forEach(c => {
                const isSold = c.status === 'sold';
                const isBooked = c.status === 'booked';
                const isCancelled = c.status === 'cancelled';
                const soldBtnClass = isSold ? 'status-btn sold' : 'status-btn';
                const bookedBtnClass = isBooked ? 'status-btn booked' : 'status-btn';
                const rowClass = isCancelled ? 'customer-row cancelled' : 'customer-row';

                html += `
                    <div class="${rowClass}" data-id="${c.id}">
                        <div class="customer-id" data-id="${c.id}" data-action="share">${c.idStr}</div>
                        <div class="customer-name" data-id="${c.id}" data-action="name">${c.name || '?'}</div>
                        <div class="status-actions">
                            <button class="${soldBtnClass}" data-id="${c.id}" data-action="sell"><i class="fas fa-check-circle"></i> تم البيع</button>
                            <button class="${bookedBtnClass}" data-id="${c.id}" data-action="book"><i class="fas fa-calendar-alt"></i> تم الحجز</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            if (privacyMode) container.classList.add('privacy-mode');
            else container.classList.remove('privacy-mode');
        }

        function updateCustomer(id, newData) {
            const index = customers.findIndex(c => c.id == id);
            if (index !== -1) {
                customers[index] = { ...customers[index], ...newData };
                saveToStorage();
                renderCustomers();
            }
        }

        function showQuickView(customer) {
            const modal = document.getElementById('quickViewModal');
            const content = document.getElementById('quickViewContent');
            content.innerHTML = `
                <div class="modal-close" id="closeQuickViewX"><i class="fas fa-times"></i></div>
                <h2>معلومات العميل</h2>
                <div class="input-field"><label>الاسم</label><input type="text" value="${customer.name || ''}" disabled></div>
                <div class="input-field"><label>رقم التليفون</label><input type="text" value="${customer.phone || ''}" disabled></div>
                <div class="input-field"><label>جواز السفر</label><input type="text" value="${customer.passport || ''}" disabled></div>
                <div class="input-field"><label>الرقم الوطني</label><input type="text" value="${customer.nationalId || ''}" disabled></div>
                <div class="input-field"><label>IBAN</label><input type="text" value="${customer.iban || ''}" disabled></div>
                <div class="input-field"><label>سعر شراء البطاقة</label><input type="text" value="${customer.cardPurchasePrice || 0}" disabled></div>
                <div class="input-field"><label>قيمة شحن المعاملة</label><input type="text" value="${customer.shippingValue || 0}" disabled></div>
                <div class="input-field"><label>سعر بيع المعاملة</label><input type="text" value="${customer.salePrice || 0}" disabled></div>
                <div class="extra-actions">
                    <div class="action-chip ${customer.half ? 'active' : ''}"><i class="fas fa-divide"></i> بالنصف</div>
                    <div class="action-chip ${customer.hasCard ? 'active' : ''}"><i class="fas fa-id-card"></i> لديه بطاقة</div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="closeQuickViewBtn">إغلاق</button>
                </div>
            `;
            modal.classList.add('show');
            document.getElementById('closeQuickViewX').addEventListener('click', () => modal.classList.remove('show'));
            document.getElementById('closeQuickViewBtn').addEventListener('click', () => modal.classList.remove('show'));
        }

        function showDetailsModal(customer) {
            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('detailsContent');
            content.innerHTML = `
                <div class="modal-close" id="closeDetailsX"><i class="fas fa-times"></i></div>
                <h2>تعديل بيانات العميل</h2>
                <div class="input-field"><label>الاسم</label><input type="text" id="detailName" value="${customer.name || ''}" readonly></div>
                <div class="input-field"><label>رقم التليفون</label><input type="text" value="${customer.phone || ''}" readonly></div>
                <div class="input-field"><label>جواز السفر</label><input type="text" value="${customer.passport || ''}" readonly></div>
                <div class="input-field"><label>الرقم الوطني</label><input type="text" value="${customer.nationalId || ''}" readonly></div>
                <div class="input-field"><label>IBAN</label><input type="text" value="${customer.iban || ''}" readonly></div>
                <div class="input-field"><label>سعر شراء البطاقة</label><input type="number" id="detailCardPurchase" value="${customer.cardPurchasePrice || ''}" step="0.01"></div>
                <div class="input-field"><label>قيمة شحن المعاملة</label><input type="number" id="detailShipping" value="${customer.shippingValue || ''}" step="0.01"></div>
                <div class="input-field"><label>سعر بيع المعاملة</label><input type="number" id="detailSalePrice" value="${customer.salePrice || ''}" step="0.01"></div>
                <div class="extra-actions">
                    <div class="action-chip ${customer.half ? 'active' : ''}" id="detailHalfChip"><i class="fas fa-divide"></i> بالنصف</div>
                    <div class="action-chip ${customer.hasCard ? 'active' : ''}" id="detailHasCardChip"><i class="fas fa-id-card"></i> لديه بطاقة</div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="closeDetailsModal">إلغاء</button>
                    <button class="btn btn-primary" id="saveDetailsBtn" data-id="${customer.id}">حفظ التعديلات</button>
                    <button class="btn btn-danger" id="cancelTransactionBtn" data-id="${customer.id}">إلغاء المعاملة</button>
                </div>
            `;
            modal.classList.add('show');

            document.getElementById('detailHalfChip').addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('active'); });
            document.getElementById('detailHasCardChip').addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('active'); });
            document.getElementById('closeDetailsX').addEventListener('click', () => modal.classList.remove('show'));
            document.getElementById('closeDetailsModal').addEventListener('click', () => modal.classList.remove('show'));
            document.getElementById('saveDetailsBtn').addEventListener('click', function(e) {
                const id = this.dataset.id;
                updateCustomer(id, {
                    cardPurchasePrice: parseFloat(document.getElementById('detailCardPurchase').value) || 0,
                    shippingValue: parseFloat(document.getElementById('detailShipping').value) || 0,
                    salePrice: parseFloat(document.getElementById('detailSalePrice').value) || 0,
                    half: document.getElementById('detailHalfChip').classList.contains('active'),
                    hasCard: document.getElementById('detailHasCardChip').classList.contains('active')
                });
                modal.classList.remove('show');
            });
            document.getElementById('cancelTransactionBtn').addEventListener('click', function(e) {
                const id = this.dataset.id;
                updateCustomer(id, { status: 'cancelled' });
                modal.classList.remove('show');
            });
        }

        function handleNameClick(e, customer) {
            if (clickTimer) {
                clearTimeout(clickTimer);
                clickTimer = null;
                showDetailsModal(customer);
            } else {
                clickTimer = setTimeout(() => {
                    clickTimer = null;
                    showQuickView(customer);
                }, 250);
            }
        }

        // دوال التقارير (مختصرة)
        function openReportsModal() {
            const grid = document.getElementById('reportsGrid');
            const totalPurchases = customers.reduce((sum, c) => sum + (c.cardPurchasePrice || 0), 0);
            const totalProfits = customers.reduce((sum, c) => sum + ((c.salePrice || 0) - (c.cardPurchasePrice || 0) - (c.shippingValue || 0)), 0);
            const ongoingCount = customers.filter(c => c.status === 'pending' || !c.status).length;
            const executedCount = customers.filter(c => c.status === 'sold').length;
            const bookingsCount = customers.filter(c => c.status === 'booked').length;
            const cancelledCount = customers.filter(c => c.status === 'cancelled').length;

            grid.innerHTML = `
                <div class="report-card" data-report="purchases"><i class="fas fa-shopping-cart"></i><h3>المشتريات</h3><div class="summary">${totalPurchases.toFixed(2)}</div></div>
                <div class="report-card" data-report="profits"><i class="fas fa-chart-line"></i><h3>الأرباح</h3><div class="summary">${totalProfits.toFixed(2)}</div></div>
                <div class="report-card" data-report="ongoing"><i class="fas fa-spinner"></i><h3>جارية</h3><div class="summary">${ongoingCount}</div></div>
                <div class="report-card" data-report="executed"><i class="fas fa-check-double"></i><h3>منفذة</h3><div class="summary">${executedCount}</div></div>
                <div class="report-card" data-report="bookings"><i class="fas fa-calendar-check"></i><h3>الحجوزات</h3><div class="summary">${bookingsCount}</div></div>
                <div class="report-card" data-report="cancelled"><i class="fas fa-ban"></i><h3>ملغية</h3><div class="summary">${cancelledCount}</div></div>
            `;

            document.querySelectorAll('.report-card').forEach(card => {
                card.addEventListener('click', () => { openTableModal(card.dataset.report); });
            });

            document.getElementById('reportsModal').classList.add('show');
        }

        function openTableModal(reportType) {
            const modal = document.getElementById('tableModal');
            const content = document.getElementById('tableModalContent');
            let title = '', tableRows = '', totalValue = null;

            switch(reportType) {
                case 'purchases':
                    title = 'المشتريات';
                    tableRows = customers.map(c => `<tr><td>${c.name}</td><td>${(c.cardPurchasePrice || 0).toFixed(2)}</td></tr>`).join('');
                    totalValue = customers.reduce((s, c) => s + (c.cardPurchasePrice || 0), 0);
                    break;
                case 'profits':
                    title = 'الأرباح';
                    tableRows = customers.map(c => {
                        const profit = (c.salePrice || 0) - (c.cardPurchasePrice || 0) - (c.shippingValue || 0);
                        return `<tr><td>${c.name}</td><td>${profit.toFixed(2)}</td></tr>`;
                    }).join('');
                    totalValue = customers.reduce((s, c) => s + ((c.salePrice || 0) - (c.cardPurchasePrice || 0) - (c.shippingValue || 0)), 0);
                    break;
                case 'ongoing':
                    title = 'المعاملات الجارية';
                    const ongoing = customers.filter(c => c.status === 'pending' || !c.status);
                    tableRows = ongoing.map(c => `<tr><td>${c.name}</td><td>جارية</td></tr>`).join('');
                    totalValue = ongoing.length;
                    break;
                case 'executed':
                    title = 'المعاملات المنفذة';
                    const executed = customers.filter(c => c.status === 'sold');
                    tableRows = executed.map(c => `<tr><td>${c.name}</td><td>${(c.salePrice || 0).toFixed(2)}</td></tr>`).join('');
                    totalValue = executed.length;
                    break;
                case 'bookings':
                    title = 'الحجوزات';
                    const booked = customers.filter(c => c.status === 'booked');
                    tableRows = booked.map(c => `<tr><td>${c.name}</td><td>${c.bookingDate || 'غير محدد'}</td></tr>`).join('');
                    totalValue = booked.length;
                    break;
                case 'cancelled':
                    title = 'المعاملات الملغية';
                    const cancelled = customers.filter(c => c.status === 'cancelled');
                    tableRows = cancelled.map(c => `<tr><td>${c.name}</td><td>ملغية</td></tr>`).join('');
                    totalValue = cancelled.length;
                    break;
            }

            content.innerHTML = `
                <div class="modal-close" id="closeTableX"><i class="fas fa-times"></i></div>
                <h2>${title}</h2>
                <div style="margin: 8px 0; color: var(--accent-color); font-size: 1.1rem;">الإجمالي: ${totalValue?.toFixed(2) ?? totalValue}</div>
                <table class="report-table"><thead><tr><th>الاسم</th><th>${reportType==='purchases'?'سعر الشراء':reportType==='profits'?'الربح':'القيمة'}</th></tr></thead><tbody>${tableRows || '<tr><td colspan="2">لا توجد بيانات</td></tr>'}</tbody></table>
                <button class="share-btn" id="shareReportBtn"><i class="fas fa-share-alt"></i> مشاركة التقرير</button>
                <div class="modal-actions"><button class="btn btn-secondary" id="closeTableModal">إغلاق</button></div>
            `;
            modal.classList.add('show');

            document.getElementById('shareReportBtn').addEventListener('click', () => {
                let text = `${title}\nالإجمالي: ${totalValue}\n`;
                text += customers.map(c => {
                    if (reportType === 'purchases') return `${c.name}: ${c.cardPurchasePrice}`;
                    if (reportType === 'profits') {
                        const profit = (c.salePrice||0) - (c.cardPurchasePrice||0) - (c.shippingValue||0);
                        return `${c.name}: ${profit.toFixed(2)}`;
                    }
                    if (reportType === 'ongoing' && (!c.status || c.status==='pending')) return c.name;
                    if (reportType === 'executed' && c.status==='sold') return `${c.name}: ${c.salePrice}`;
                    if (reportType === 'bookings' && c.status==='booked') return `${c.name}: ${c.bookingDate}`;
                    if (reportType === 'cancelled' && c.status==='cancelled') return c.name;
                    return null;
                }).filter(Boolean).join('\n');
                if (navigator.share) navigator.share({ title, text });
                else navigator.clipboard.writeText(text).then(() => alert('تم نسخ التقرير'));
            });

            document.getElementById('closeTableX').addEventListener('click', () => modal.classList.remove('show'));
            document.getElementById('closeTableModal').addEventListener('click', () => modal.classList.remove('show'));
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('show');
        }

        function closeAllModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
        }

        function shareCustomer(customer) {
            const text = `العميل: ${customer.name}\nرقم التليفون: ${customer.phone}\nجواز السفر: ${customer.passport}\nالرقم الوطني: ${customer.nationalId}\nIBAN: ${customer.iban}`;
            if (navigator.share) navigator.share({ title: 'بيانات العميل', text: text });
            else navigator.clipboard?.writeText(text).then(() => alert('تم نسخ البيانات'));
        }

        function openSellModal(customer) {
            currentCustomerId = customer.id;
            currentSellStep = 0;
            tempSellData = {
                cardPurchasePrice: customer.cardPurchasePrice || '',
                shippingValue: customer.shippingValue || '',
                salePrice: customer.salePrice || ''
            };
            renderSellStep();
            document.getElementById('sellModal').classList.add('show');
        }

        function renderSellStep() {
            const stepContainer = document.getElementById('sellSteps');
            const steps = ['سعر شراء البطاقة', 'قيمة شحن المعاملة', 'سعر بيع المعاملة'];
            const keys = ['cardPurchasePrice', 'shippingValue', 'salePrice'];
            const currentKey = keys[currentSellStep];
            const currentValue = tempSellData[currentKey] !== '' ? tempSellData[currentKey] : '';

            stepContainer.innerHTML = `
                <div style="margin-bottom:16px;color:var(--text-secondary);">الخطوة ${currentSellStep+1} من 3: ${steps[currentSellStep]}</div>
                <div class="input-field"><label>${steps[currentSellStep]}</label><input type="number" id="sellStepInput" value="${currentValue}" step="0.01" placeholder="أدخل القيمة"></div>
            `;

            document.getElementById('nextSellStep').onclick = function() {
                const inputVal = parseFloat(document.getElementById('sellStepInput').value) || 0;
                tempSellData[keys[currentSellStep]] = inputVal;

                if (currentSellStep < 2) {
                    currentSellStep++;
                    renderSellStep();
                } else {
                    updateCustomer(currentCustomerId, {
                        cardPurchasePrice: tempSellData.cardPurchasePrice,
                        shippingValue: tempSellData.shippingValue,
                        salePrice: tempSellData.salePrice,
                        status: 'sold'
                    });
                    closeAllModals();
                }
            };
        }

        function openBookingModal(customer) {
            currentCustomerId = customer.id;
            document.getElementById('bookingDate').value = customer.bookingDate || '';
            document.getElementById('bookingModal').classList.add('show');
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            const btn = document.getElementById('darkModeToggle');
            if (darkMode) {
                document.body.classList.remove('light-mode');
                btn.innerHTML = '<i class="fas fa-moon"></i> دارك';
            } else {
                document.body.classList.add('light-mode');
                btn.innerHTML = '<i class="fas fa-sun"></i> لايت';
            }
        }

        // تهيئة الصفحة
        window.addEventListener('load', function() {
            loadFromStorage();
            renderCustomers();

            // إضافة محتوى مودال الإضافة
            document.getElementById('addModalContent').innerHTML += `
                <h2>إضافة معاملة</h2>
                <div class="input-field"><label>الاسم</label><input type="text" id="name" placeholder="الاسم كاملاً"></div>
                <div class="input-field"><label>رقم التليفون</label><input type="tel" inputmode="numeric" id="phone"></div>
                <div class="input-field"><label>جواز السفر</label><input type="text" id="passport"></div>
                <div class="input-field"><label>الرقم الوطني</label><input type="tel" inputmode="numeric" id="nationalId"></div>
                <div class="input-field"><label>IBAN</label><input type="text" id="iban"></div>
                <div class="input-field"><label>سعر شراء البطاقة</label><input type="number" id="cardPurchase" step="0.01"></div>
                <div class="input-field"><label>قيمة شحن المعاملة</label><input type="number" id="shipping" step="0.01"></div>
                <div class="input-field"><label>سعر بيع المعاملة</label><input type="number" id="salePrice" step="0.01"></div>
                <div class="extra-actions">
                    <div class="action-chip" id="halfChipAdd"><i class="fas fa-divide"></i> بالنصف</div>
                    <div class="action-chip" id="hasCardChipAdd"><i class="fas fa-id-card"></i> لديه بطاقة</div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="closeAddModalBtn">إلغاء</button>
                    <button class="btn btn-primary" id="saveCustomerBtn">حفظ</button>
                </div>
            `;

            document.getElementById('openAddModalBtn').addEventListener('click', openAddModal);
            document.getElementById('closeAddModalBtn')?.addEventListener('click', closeAllModals);
            document.getElementById('closeAddModalX')?.addEventListener('click', closeAllModals);
            document.getElementById('halfChipAdd')?.addEventListener('click', function(){ this.classList.toggle('active'); });
            document.getElementById('hasCardChipAdd')?.addEventListener('click', function(){ this.classList.toggle('active'); });

            document.getElementById('saveCustomerBtn').addEventListener('click', function() {
                const name = document.getElementById('name').value.trim();
                if (!name) return alert('الاسم مطلوب');
                const newCustomer = {
                    id: generateId(),
                    name, phone: document.getElementById('phone').value, passport: document.getElementById('passport').value,
                    nationalId: document.getElementById('nationalId').value, iban: document.getElementById('iban').value,
                    cardPurchasePrice: parseFloat(document.getElementById('cardPurchase').value) || 0,
                    shippingValue: parseFloat(document.getElementById('shipping').value) || 0,
                    salePrice: parseFloat(document.getElementById('salePrice').value) || 0,
                    half: document.getElementById('halfChipAdd').classList.contains('active'),
                    hasCard: document.getElementById('hasCardChipAdd').classList.contains('active'),
                    status: 'pending', bookingDate: null,
                    idStr: (customers.length+1).toString()
                };
                customers.push(newCustomer);
                saveToStorage();
                renderCustomers();
                closeAllModals();
            });

            // تفويض الأحداث على القائمة
            document.getElementById('customersList').addEventListener('click', function(e) {
                const target = e.target.closest('[data-id]');
                if (!target) return;
                const id = target.dataset.id;
                const customer = customers.find(c => c.id == id);
                if (!customer) return;

                if (target.classList.contains('customer-id') || target.dataset.action === 'share') {
                    shareCustomer(customer);
                } else if (target.dataset.action === 'sell') {
                    openSellModal(customer);
                } else if (target.dataset.action === 'book') {
                    openBookingModal(customer);
                } else if (target.classList.contains('customer-name') || target.dataset.action === 'name') {
                    e.preventDefault();
                    handleNameClick(e, customer);
                }
            });

            // إغلاق المودالات عند النقر على الخلفية
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', function(e) { if (e.target === overlay) this.classList.remove('show'); });
            });

            document.getElementById('closeSellX')?.addEventListener('click', () => document.getElementById('sellModal').classList.remove('show'));
            document.getElementById('closeBookingX')?.addEventListener('click', () => document.getElementById('bookingModal').classList.remove('show'));
            document.getElementById('closeReportsX')?.addEventListener('click', () => document.getElementById('reportsModal').classList.remove('show'));
            document.getElementById('closeReportsModal')?.addEventListener('click', () => document.getElementById('reportsModal').classList.remove('show'));
            document.getElementById('closeSellModal')?.addEventListener('click', () => document.getElementById('sellModal').classList.remove('show'));
            document.getElementById('closeBookingModal')?.addEventListener('click', () => document.getElementById('bookingModal').classList.remove('show'));

            document.getElementById('saveBookingBtn').addEventListener('click', function() {
                const date = document.getElementById('bookingDate').value;
                if (currentCustomerId) updateCustomer(currentCustomerId, { status: 'booked', bookingDate: date });
                document.getElementById('bookingModal').classList.remove('show');
            });

            // استيراد / تصدير
            document.getElementById('importBtn').addEventListener('click', function() {
                document.getElementById('fileImport').click();
            });
            document.getElementById('fileImport').addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    importFromExcel(e.target.files[0]);
                    e.target.value = '';
                }
            });
            document.getElementById('exportBtn').addEventListener('click', exportToExcel);
            document.getElementById('privacyToggle').addEventListener('click', togglePrivacy);
            document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('reportsBtn').addEventListener('click', openReportsModal);

            // أزرار الأسفل
            document.getElementById('homeBtn').addEventListener('click', function() {
                document.querySelector('.customers-list').scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('goTopBtn').addEventListener('click', function() {
                document.querySelector('.customers-list').scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        function exportToExcel() { /* ... */ }
        function importFromExcel(file) { /* ... */ }
        function togglePrivacy() { /* ... */ }
    })();
</script>
</body>
</html>
